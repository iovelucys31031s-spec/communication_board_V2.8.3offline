                if (currentSyllable.length === 0) return [...KOR_C, ...KOR_V, 'SPACE'];
                if (currentSyllable.length === 1) {
                    if (KOR_C.includes(currentSyllable[0])) return [...KOR_V, 'SPACE'];
                    if (KOR_V.includes(currentSyllable[0])) return ['SPACE'];
                }
                if (currentSyllable.length === 2) {
                    if (KOR_C.includes(currentSyllable[0]) && KOR_V.includes(currentSyllable[1])) return [...KOR_C, 'SPACE'];
                    return ['SPACE'];
                }
                if (currentSyllable.length === 3) return ['SPACE'];
                return ['SPACE'];
            }
            return null;
        }, [currentSyllable, language]);

        const handleKeyPress = (char) => {
            let textToSpeak = char;

            if (language === 'zhuyin' && PUNCTUATIONS.includes(char)) {
                speak(PUNCT_NAMES[char] || char);
                const newCompleted = [...completedInputs];
                if (currentSyllable.length > 0) newCompleted.push(currentSyllable.join(''));
                newCompleted.push(char);
                setCompletedInputs(newCompleted);
                setCurrentSyllable([]);
                return;
            }

            if (language === 'japanese') {
                if (char === '゛/゜') {
                    const lastChar = currentSyllable[currentSyllable.length - 1];
                    if (JP_DAKUTEN[lastChar]) {
                        const newChar = JP_DAKUTEN[lastChar];
                        setCurrentSyllable(prev => [...prev.slice(0, -1), newChar]);
                        speak(newChar);
                    }
                    return;
                } else if (char === '小') {
                    const lastChar = currentSyllable[currentSyllable.length - 1];
                    if (JP_SMALL[lastChar]) {
                        const newChar = JP_SMALL[lastChar];
                        setCurrentSyllable(prev => [...prev.slice(0, -1), newChar]);
                        speak(newChar);
                    }
                    return;
                }
            }

            if (language === 'zhuyin') {
            if (ZHUYIN_CATS.T.includes(char)) {
                let toneMark = char === '一聲' ? '' : char;
                textToSpeak = getHanziFromZhuyin([...currentSyllable, toneMark].join('')); 
            } else if (char === 'SPACE') textToSpeak = '空格';
            } else if (language === 'korean') {
            if (char === 'SPACE') textToSpeak = '띄어쓰기';
            else {
                const nextSyllable = [...currentSyllable, char];
                if (nextSyllable.length >= 2) textToSpeak = getHangulFromJamo(nextSyllable.join(''));
                else textToSpeak = char;
            }
            } else {
            if (char === 'SPACE') {
                if (language === 'english') textToSpeak = 'space';
                else if (language === 'japanese') textToSpeak = 'スペース';
                else textToSpeak = '空格';
            }
            }
            speak(textToSpeak);

            if (language === 'zhuyin') {
            if (ZHUYIN_CATS.T.includes(char)) {
                let toneMark = char === '一聲' ? '' : char;
                setCompletedInputs([...completedInputs, [...currentSyllable, toneMark].join('')]);
                setCurrentSyllable([]);
            } else {
                if (getAvailableKeys && !getAvailableKeys.includes(char)) {
                if (ZHUYIN_CATS.C.includes(char)) {
                    if(currentSyllable.length > 0) setCompletedInputs([...completedInputs, currentSyllable.join('')]);
                    setCurrentSyllable([char]);
                }
                return;
                }
                setCurrentSyllable([...currentSyllable, char]);
            }
            } else if (language === 'korean') {
            if (char === 'SPACE') {
                setCompletedInputs([...completedInputs, currentSyllable.join('') + ' ']);
                setCurrentSyllable([]);
            } else {
                if (getAvailableKeys && !getAvailableKeys.includes(char)) {
                if (KOR_C.includes(char) || KOR_V.includes(char)) {
                    if (currentSyllable.length > 0) {
                        setCompletedInputs([...completedInputs, currentSyllable.join('')]);
                    }
                    setCurrentSyllable([char]);
                }
                return;
                }
                setCurrentSyllable([...currentSyllable, char]);
            }
            } else {
            if (char === 'SPACE') {
                setCompletedInputs([...completedInputs, currentSyllable.join('') + ' ']);
                setCurrentSyllable([]);
            } else {
                setCurrentSyllable([...currentSyllable, char]);
            }
            }
        };

        const handleBackspace = () => {
            if (currentSyllable.length > 0) {
            setCurrentSyllable(prev => prev.slice(0, -1));
            } else if (completedInputs.length > 0) {
            const newInputs = [...completedInputs];
            const lastCompleted = newInputs.pop().trim();
            if (PUNCTUATIONS.includes(lastCompleted)) {
                setCompletedInputs(newInputs);
                setCurrentSyllable([]);
            } else {
                const chars = lastCompleted.split('');
                const lastChar = chars[chars.length - 1];
                if (['ˊ', 'ˇ', 'ˋ', '˙'].includes(lastChar)) chars.pop();
                setCompletedInputs(newInputs);
                setCurrentSyllable(chars);
            }
            }
        };

        const handleClear = () => {
            setCompletedInputs([]);
            setCurrentSyllable([]);
        };

        const currentTheme = THEMES[theme];
        const disabledStyle = {
            backgroundColor: '#f3f4f6', color: '#9ca3af', 
            backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.02) 10px, rgba(0,0,0,0.02) 20px)',
            cursor: 'not-allowed', transform: 'scale(0.98)', borderColor: 'transparent', boxShadow: 'none'
        };

        // 頁面渲染邏輯 (這部分與原本相同，為了節省長度，此處保持原有程式碼邏輯)
        if (view === 'tts-help') {
            // ... (原本的急救包代碼)
        }

        if (view === 'settings') {
            // ... (原本的設定區代碼)
        }

        const BIG_TONES = ['ˇ', 'ˋ', 'ˊ', '˙'];
        const spaceChar = language === 'zhuyin' ? '一聲' : 'SPACE';
        const isSpaceEnabled = !getAvailableKeys || getAvailableKeys.includes(spaceChar);

        return (
            <div className={`h-[100dvh] w-full flex flex-col ${currentTheme.bg} overflow-hidden select-none pb-2 md:pb-4 landscape:pb-1`}>
            
            <div className="h-[40%] landscape:h-[35%] w-full flex gap-1 p-2 md:p-4 landscape:p-1 min-h-0 shrink-0">
                <button onClick={handlePlayVoice} className="w-20 md:w-28 landscape:w-24 flex flex-col items-center justify-center bg-emerald-500 text-white rounded-xl md:rounded-2xl landscape:rounded-lg shadow-md active:scale-95 transition-transform">
                <Play className="w-10 h-10 md:w-12 md:h-12 landscape:w-8 landscape:h-8 fill-current" />
                <span className="text-sm md:text-lg landscape:text-sm font-bold mt-2 landscape:mt-1">播音</span>
                </button>

                <div className={`flex-1 rounded-xl md:rounded-2xl landscape:rounded-lg p-4 landscape:p-3 overflow-y-auto ${currentTheme.displayBg} ${currentTheme.displayBorder} shadow-inner flex items-start content-start`}>
                <div className={`font-bold tracking-widest flex flex-wrap gap-x-2 gap-y-1 md:gap-x-3 md:gap-y-2 landscape:gap-x-1 landscape:gap-y-1 ${currentTheme.text} break-words w-full`} style={{ fontSize: `${displayFontSize}px`, lineHeight: '1.4' }}>
                    {completedInputs.map((s, i) => <span key={i}>{language === 'korean' ? getHangulFromJamo(s.trim()) : s}</span>)}
                    <span className="border-b-[0.1em] border-current animate-pulse min-w-[0.5em] h-[1.2em]">
                        {language === 'korean' ? getHangulFromJamo(currentSyllable.join('')) : currentSyllable.join('')}
                    </span>
                </div>
                </div>

                <div className="w-20 md:w-28 landscape:w-24 flex flex-col gap-2 landscape:gap-1">
                {buttonOrder === 'deleteFirst' ? (
                    <>
                        <button onClick={handleBackspace} className="flex-1 flex flex-col items-center justify-center bg-amber-500 text-white rounded-xl md:rounded-2xl landscape:rounded-lg shadow-md active:scale-95 transition-transform">
                            <Delete className="w-8 h-8 md:w-10 md:h-10 landscape:w-7 landscape:h-7" />
                            <span className="text-xs md:text-base landscape:text-[11px] font-bold mt-1 landscape:mt-0">倒退</span>
                        </button>
                        <button onClick={handleClear} className="flex-1 flex flex-col items-center justify-center bg-rose-500 text-white rounded-xl md:rounded-2xl landscape:rounded-lg shadow-md active:scale-95 transition-transform">
                            <Trash2 className="w-8 h-8 md:w-10 md:h-10 landscape:w-7 landscape:h-7" />
                            <span className="text-xs md:text-base landscape:text-[11px] font-bold mt-1 landscape:mt-0">清空</span>
                        </button>
                    </>
                ) : (
                    <>
                        <button onClick={handleClear} className="flex-1 flex flex-col items-center justify-center bg-rose-500 text-white rounded-xl md:rounded-2xl landscape:rounded-lg shadow-md active:scale-95 transition-transform">
                            <Trash2 className="w-8 h-8 md:w-10 md:h-10 landscape:w-7 landscape:h-7" />
                            <span className="text-xs md:text-base landscape:text-[11px] font-bold mt-1 landscape:mt-0">清空</span>
                        </button>
                        <button onClick={handleBackspace} className="flex-1 flex flex-col items-center justify-center bg-amber-500 text-white rounded-xl md:rounded-2xl landscape:rounded-lg shadow-md active:scale-95 transition-transform">
                            <Delete className="w-8 h-8 md:w-10 md:h-10 landscape:w-7 landscape:h-7" />
                            <span className="text-xs md:text-base landscape:text-[11px] font-bold mt-1 landscape:mt-0">倒退</span>
                        </button>
                    </>
                )}
                </div>
            </div>

            <div className="flex-1 flex flex-col px-1 md:px-3 landscape:px-1 landscape:md:px-2 gap-0.5 md:gap-2 landscape:gap-0 mt-0.5 landscape:mt-0 min-h-0 overflow-hidden justify-center">
                {KEYBOARD_LAYOUTS[language].map((row, rowIndex) => (
                <div key={rowIndex} className="flex-1 flex gap-1 md:gap-2 landscape:gap-1 justify-center">
                    {row.map((char, colIndex) => {
                    if (char === '') {
                        return <div key={`${rowIndex}-${colIndex}`} className="flex-1 h-full border border-transparent"></div>;
                    }

                    const isEnabled = !getAvailableKeys || getAvailableKeys.includes(char);
                    const isBigTone = BIG_TONES.includes(char);
                    const isPunctuation = language === 'zhuyin' && PUNCTUATIONS.includes(char);
                    const isBigSymbol = isBigTone || isPunctuation;

                    const textClass = isBigSymbol 
                        ? 'text-4xl sm:text-5xl md:text-6xl landscape:text-3xl landscape:md:text-5xl font-black'
                        : 'font-extrabold';

                    return (
                        <button
                        key={`${rowIndex}-${colIndex}`}
                        onClick={() => isEnabled && handleKeyPress(char)}
                        style={!isEnabled ? disabledStyle : (!isBigSymbol ? { fontSize: `${keyboardFontSize}px` } : {})}
                        className={`
                            flex-1 h-full rounded-xl md:rounded-2xl landscape:rounded-lg landscape:md:rounded-xl shadow flex items-center justify-center 
                            transition-all select-none touch-manipulation overflow-hidden
                            ${isEnabled ? `${currentTheme.keyBg} ${currentTheme.keyText} ${currentTheme.keyBorder} ${currentTheme.keyActive}` : ''}
                        `}
                        >
                        {isBigTone ? (
                            <ToneIcon char={char} className="w-[55%] h-[55%] md:w-[60%] md:h-[60%] landscape:w-[50%] landscape:h-[50%]" />
                        ) : (
                            <span className={`flex items-center justify-center leading-none ${textClass}`}>{char}</span>
                        )}
                        </button>
                    );
                    })}
                </div>
                ))}
            </div>

            <div className="h-14 md:h-20 landscape:h-[15%] flex justify-between gap-2 px-2 md:px-4 landscape:p-1 mt-0.5 shrink-0 min-h-0">
                
                <button 
                onClick={() => {
                    const currentIndex = enabledLanguages.indexOf(language);
                    const nextIndex = (currentIndex + 1) % enabledLanguages.length;
                    setLanguage(enabledLanguages[nextIndex]);
                }} 
                className="flex-[1.5] flex flex-col items-center justify-center bg-blue-400 text-white rounded-xl landscape:rounded-lg shadow-md active:scale-95 px-2 transition-transform"
                >
                <Globe className="w-6 h-6 mb-1 landscape:w-4 landscape:h-4 landscape:mb-0" />
                <span className="text-xs md:text-sm landscape:text-[10px] font-bold tracking-widest text-center break-words leading-tight">
                    {LANG_SETTINGS[language]?.label}
                </span>
                </button>

                <button 
                onClick={() => isSpaceEnabled && handleKeyPress(spaceChar)}
                style={!isSpaceEnabled ? disabledStyle : {}}
                className={`flex-[5] flex items-center justify-center rounded-xl landscape:rounded-lg shadow-md active:scale-95 transition-all
                    text-xl md:text-3xl landscape:text-base font-bold tracking-widest
                    ${isSpaceEnabled ? `${currentTheme.keyBg} ${currentTheme.keyText} ${currentTheme.keyBorder} ${currentTheme.keyActive}` : ''}
                `}
                >
                {language === 'zhuyin' ? '一聲' : language === 'korean' ? '띄어쓰기 (空格)' : language === 'japanese' ? '空白' : '空白鍵'}
                </button>

                <button 
                onClick={() => {
                    const doc = document.documentElement;
                    if (doc.requestFullscreen) {
                        doc.requestFullscreen();
                    } else if (doc.webkitRequestFullscreen) { /* 兼容 Safari / 舊版 Chrome */
                        doc.webkitRequestFullscreen();
                    }
                }}
                className="flex-[1.5] flex flex-col items-center justify-center bg-amber-600 text-white rounded-xl landscape:rounded-lg shadow-md active:scale-95 transition-transform"
                >
                <Maximize className="w-6 h-6 mb-1 landscape:w-4 landscape:h-4 landscape:mb-0" />
                <span className="text-[11px] md:text-sm landscape:text-[9px] font-bold">全螢幕</span>
                </button>

                <button onClick={() => { setPendingFontSize(displayFontSize); setView('settings'); }} className="flex-[1.5] flex flex-col items-center justify-center bg-slate-500 text-white rounded-xl landscape:rounded-lg shadow-md active:scale-95 transition-transform">
                <Settings className="w-6 h-6 mb-1 landscape:w-4 landscape:h-4 landscape:mb-0" />
                <span className="text-[11px] md:text-sm landscape:text-[9px] font-bold">設定</span>
                </button>
            </div>

            </div>
        );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(registration => {
              console.log('ServiceWorker 註冊成功，範圍:', registration.scope);
            })
            .catch(error => {
              console.log('ServiceWorker 註冊失敗:', error);
            });
        });
      }
    </script>
</body>
</html>
